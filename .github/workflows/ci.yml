name: "Sample cipeline react"

on:
  push:
    branches:
      - main
      - master


jobs:
  build-and-test:
    runs-on: ubuntu-latest
    

    steps:
      - name: "Setup node js "
        uses: actions/setup-node@v4
        with: 
          node-version: '21'

      - name: "version of node"
        run: node --version

      - name: "Clone the repo"
        run: actions/checkout@v2

    
